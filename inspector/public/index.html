<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Email Assistant Inspector</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    crossorigin="anonymous"
  />
  <style>
    body { font-size: 0.9rem; }
    .tab-panel { min-height: 300px; }
    .pre-scroll {
      max-height: 420px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.8rem;
    }
    .trunc-sm  { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; vertical-align: bottom; }
    .trunc-md  { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; vertical-align: bottom; }
    .trunc-lg  { max-width: 380px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; vertical-align: bottom; }
    .stat-val  { font-size: 1.5rem; font-weight: 600; }
    tbody tr[data-clickable] { cursor: pointer; }
  </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3 py-2">
  <span class="navbar-brand mb-0 h5">&#9993; Email Assistant Inspector</span>
  <span class="badge bg-secondary">read-only</span>
</nav>

<div class="container-fluid mt-3 px-4">

  <ul class="nav nav-tabs" id="mainTabs">
    <li class="nav-item"><a class="nav-link active" href="#" data-tab="dashboard">Dashboard</a></li>
    <li class="nav-item"><a class="nav-link" href="#" data-tab="emails">Emails</a></li>
    <li class="nav-item"><a class="nav-link" href="#" data-tab="groups">Groups</a></li>
    <li class="nav-item"><a class="nav-link" href="#" data-tab="memory">Memory</a></li>
    <li class="nav-item"><a class="nav-link" href="#" data-tab="digests">Digests</a></li>
    <li class="nav-item"><a class="nav-link" href="#" data-tab="brainprefs">Brain &amp; Prefs</a></li>
  </ul>

  <!-- Dashboard -->
  <div id="panel-dashboard" class="tab-panel mt-3">
    <div class="row g-3">
      <div class="col-md-4 col-lg-3">
        <div class="card h-100">
          <div class="card-header fw-semibold">Database Stats</div>
          <div class="card-body" id="stats-body">
            <div class="text-muted small">Loading…</div>
          </div>
        </div>
      </div>
      <div class="col-md-8 col-lg-9">
        <div class="card h-100">
          <div class="card-header fw-semibold">Recent Processing Runs</div>
          <div class="card-body p-0" id="runs-body">
            <div class="p-3 text-muted small">Loading…</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Emails -->
  <div id="panel-emails" class="tab-panel mt-3 d-none">
    <div class="row g-2 mb-3 align-items-end">
      <div class="col-auto">
        <label class="form-label mb-1 small fw-semibold">Category</label>
        <select class="form-select form-select-sm" id="email-cat">
          <option value="">All categories</option>
        </select>
      </div>
      <div class="col-auto">
        <label class="form-label mb-1 small fw-semibold">Status</label>
        <select class="form-select form-select-sm" id="email-digested">
          <option value="">All</option>
          <option value="false">Pending (undigested)</option>
          <option value="true">Digested</option>
        </select>
      </div>
      <div class="col-auto">
        <label class="form-label mb-1 small fw-semibold">Per page</label>
        <select class="form-select form-select-sm" id="email-pagesize">
          <option value="25" selected>25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </div>
      <div class="col-auto">
        <button class="btn btn-sm btn-outline-secondary" id="email-refresh">Refresh</button>
      </div>
    </div>
    <div id="emails-table-wrap"><div class="text-muted small">Loading…</div></div>
    <div id="emails-pagination" class="mt-2 d-flex align-items-center gap-2"></div>
  </div>

  <!-- Groups -->
  <div id="panel-groups" class="tab-panel mt-3 d-none">
    <div id="groups-wrap"><div class="text-muted small">Loading…</div></div>
  </div>

  <!-- Memory -->
  <div id="panel-memory" class="tab-panel mt-3 d-none">
    <div id="memory-wrap"><div class="text-muted small">Loading…</div></div>
  </div>

  <!-- Digests -->
  <div id="panel-digests" class="tab-panel mt-3 d-none">
    <div id="digests-wrap"><div class="text-muted small">Loading…</div></div>
  </div>

  <!-- Brain & Prefs -->
  <div id="panel-brainprefs" class="tab-panel mt-3 d-none">
    <div class="row g-3">
      <div class="col-lg-6">
        <div class="card">
          <div class="card-header fw-semibold">Brain <small class="text-muted fw-normal">(data/brain.md)</small></div>
          <div class="card-body p-2">
            <pre id="brain-content" class="pre-scroll mb-0" style="max-height:70vh">Loading…</pre>
          </div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card">
          <div class="card-header fw-semibold">User Prefs <small class="text-muted fw-normal">(data/user-prefs.md)</small></div>
          <div class="card-body p-2">
            <pre id="prefs-content" class="pre-scroll mb-0" style="max-height:70vh">Loading…</pre>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Shared detail modal -->
<div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header py-2">
        <h6 class="modal-title mb-0" id="detailModalLabel">Detail</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="detailModalBody">
        <div class="text-muted">Loading…</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script>
'use strict';

// ─── Utilities ────────────────────────────────────────────────────────────────

function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return isNaN(d) ? esc(iso) : d.toLocaleString();
}

function fmtBool(v) {
  return v ? '<span class="text-success">&#10003;</span>' : '<span class="text-secondary">&#10005;</span>';
}

function impBadge(n) {
  if (n == null) return '<span class="badge bg-secondary text-white">?</span>';
  const cls = n <= 3 ? 'bg-secondary' : n <= 6 ? 'bg-warning text-dark' : 'bg-danger';
  return '<span class="badge ' + cls + '">' + n + '</span>';
}

function runBadge(s) {
  const m = { complete: 'bg-success', running: 'bg-primary', partial: 'bg-warning text-dark' };
  return '<span class="badge ' + (m[s] || 'bg-secondary') + '">' + esc(s) + '</span>';
}

function memBadge(s) {
  const m = { permanent: 'bg-primary', active: 'bg-success', expired: 'bg-secondary' };
  return '<span class="badge ' + (m[s] || 'bg-secondary') + '">' + esc(s) + '</span>';
}

function catBadge(c) {
  return c ? '<span class="badge bg-info text-dark">' + esc(c) + '</span>' : '—';
}

function errHtml(msg) {
  return '<div class="alert alert-danger">' + esc(msg) + '</div>';
}

function drow(label, val) {
  return '<tr><th class="pe-3 text-nowrap fw-normal text-muted" style="width:160px">'
    + esc(label) + '</th><td>' + val + '</td></tr>';
}

async function api(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status + ' — ' + url);
  return r.json();
}

// ─── Modal ────────────────────────────────────────────────────────────────────

let _modal;

function showModal(title, body) {
  document.getElementById('detailModalLabel').textContent = title;
  document.getElementById('detailModalBody').innerHTML = body;
  if (!_modal) _modal = new bootstrap.Modal(document.getElementById('detailModal'));
  _modal.show();
}

// ─── Tab switching ────────────────────────────────────────────────────────────

const _loaded = {};

const _loaders = {
  dashboard:  loadDashboard,
  emails:     loadEmails,
  groups:     loadGroups,
  memory:     loadMemory,
  digests:    loadDigests,
  brainprefs: loadBrainPrefs,
};

function switchTab(tab) {
  document.querySelectorAll('#mainTabs .nav-link').forEach(l =>
    l.classList.toggle('active', l.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p =>
    p.classList.toggle('d-none', p.id !== 'panel-' + tab));
  if (!_loaded[tab]) { _loaded[tab] = true; _loaders[tab]?.(); }
}

// ─── Dashboard ────────────────────────────────────────────────────────────────

async function loadDashboard() {
  try {
    const { stats: s, recentRuns } = await api('/api/dashboard');

    document.getElementById('stats-body').innerHTML =
      '<table class="table table-sm table-borderless mb-0"><tbody>' +
      [
        ['Total Emails',    '<span class="stat-val">' + s.total    + '</span>'],
        ['Analyzed',        '<span class="stat-val text-primary">' + s.analyzed + '</span>'],
        ['Digested',        '<span class="stat-val text-success">' + s.digested + '</span>'],
        ['Pending',         '<span class="stat-val text-warning">' + s.pending  + '</span>'],
        ['Groups',          '<span class="stat-val">' + s.groups   + '</span>'],
        ['Active Memories', '<span class="stat-val">' + s.memory   + '</span>'],
      ].map(([l, v]) =>
        '<tr><td class="text-muted py-1">' + l + '</td><td class="py-1">' + v + '</td></tr>'
      ).join('') +
      '</tbody></table>';

    if (!recentRuns.length) {
      document.getElementById('runs-body').innerHTML =
        '<div class="p-3 text-muted small">No processing runs recorded yet.</div>';
      return;
    }

    document.getElementById('runs-body').innerHTML =
      '<table class="table table-sm table-hover mb-0"><thead class="table-light"><tr>' +
      '<th>#</th><th>Type</th><th>Status</th><th>Started</th><th>Completed</th><th>Emails</th><th>Notes</th>' +
      '</tr></thead><tbody>' +
      recentRuns.map(r =>
        '<tr><td class="text-muted">' + r.id + '</td>' +
        '<td><code>' + esc(r.run_type) + '</code></td>' +
        '<td>' + runBadge(r.status) + '</td>' +
        '<td class="small text-nowrap">' + fmtDate(r.started_at) + '</td>' +
        '<td class="small text-nowrap">' + fmtDate(r.completed_at) + '</td>' +
        '<td>' + (r.email_count ?? '—') + '</td>' +
        '<td class="small text-muted">' + esc(r.notes ?? '') + '</td></tr>'
      ).join('') +
      '</tbody></table>';
  } catch (err) {
    document.getElementById('stats-body').innerHTML = errHtml(err.message);
  }
}

// ─── Emails ───────────────────────────────────────────────────────────────────

const _email = { page: 1, pageSize: 25, category: '', digested: '' };

async function loadEmails() {
  try {
    const cats = await api('/api/emails/categories');
    const sel = document.getElementById('email-cat');
    cats.forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      sel.appendChild(o);
    });
  } catch (_) {}

  document.getElementById('email-cat').addEventListener('change', e => {
    _email.category = e.target.value; _email.page = 1; renderEmails();
  });
  document.getElementById('email-digested').addEventListener('change', e => {
    _email.digested = e.target.value; _email.page = 1; renderEmails();
  });
  document.getElementById('email-pagesize').addEventListener('change', e => {
    _email.pageSize = +e.target.value; _email.page = 1; renderEmails();
  });
  document.getElementById('email-refresh').addEventListener('click', () => {
    _email.page = 1; renderEmails();
  });

  renderEmails();
}

async function renderEmails() {
  const wrap = document.getElementById('emails-table-wrap');
  const pag  = document.getElementById('emails-pagination');
  wrap.innerHTML = '<div class="text-muted small">Loading…</div>';
  pag.innerHTML  = '';

  const q = new URLSearchParams({ page: _email.page, pageSize: _email.pageSize });
  if (_email.category) q.set('category', _email.category);
  if (_email.digested) q.set('digested', _email.digested);

  try {
    const data = await api('/api/emails?' + q);
    const rows = data.data;
    const pg   = data.pagination;

    if (!rows.length) {
      wrap.innerHTML = '<div class="text-muted py-3">No emails match the current filters.</div>';
      return;
    }

    wrap.innerHTML =
      '<div class="table-responsive">' +
      '<table class="table table-sm table-hover align-middle mb-0">' +
      '<thead class="table-light"><tr>' +
      '<th style="width:40px">#</th><th>From</th><th>Subject</th>' +
      '<th>Received</th><th>Category</th><th>Imp.</th><th>Digested</th>' +
      '</tr></thead><tbody>' +
      rows.map(r =>
        '<tr data-clickable data-id="' + r.id + '">' +
        '<td class="text-muted small">' + r.id + '</td>' +
        '<td><span class="trunc-sm" title="' + esc(r.from_email) + '">' + esc(r.from_name || r.from_email) + '</span></td>' +
        '<td><span class="trunc-lg" title="' + esc(r.subject) + '">' + esc(r.subject) + '</span></td>' +
        '<td class="text-nowrap small">' + fmtDate(r.received_at) + '</td>' +
        '<td>' + catBadge(r.category) + '</td>' +
        '<td>' + impBadge(r.importance) + '</td>' +
        '<td>' + fmtBool(r.digested_at) + '</td>' +
        '</tr>'
      ).join('') +
      '</tbody></table></div>';

    wrap.querySelectorAll('tr[data-clickable]').forEach(tr =>
      tr.addEventListener('click', () => showEmailDetail(tr.dataset.id)));

    // Pagination
    if (pg.totalPages > 1) {
      pag.innerHTML =
        '<button class="btn btn-sm btn-outline-secondary" id="pg-prev"' + (pg.page <= 1 ? ' disabled' : '') + '>&#8249; Prev</button>' +
        '<span class="small text-muted">Page ' + pg.page + ' of ' + pg.totalPages + ' (' + pg.total + ' total)</span>' +
        '<button class="btn btn-sm btn-outline-secondary" id="pg-next"' + (pg.page >= pg.totalPages ? ' disabled' : '') + '>Next &#8250;</button>';
      pag.querySelector('#pg-prev').addEventListener('click', () => { _email.page--; renderEmails(); });
      pag.querySelector('#pg-next').addEventListener('click', () => { _email.page++; renderEmails(); });
    } else {
      pag.innerHTML = '<span class="small text-muted">' + pg.total + ' email(s)</span>';
    }
  } catch (err) {
    wrap.innerHTML = errHtml(err.message);
  }
}

async function showEmailDetail(id) {
  showModal('Email #' + id, '<div class="text-muted">Loading…</div>');
  try {
    const r = await api('/api/emails/' + id);

    const bodyHtml = r.clean_body
      ? '<pre class="pre-scroll border rounded p-2 bg-light mb-0">' + esc(r.clean_body) + '</pre>'
      : '<span class="text-muted small">No body stored.</span>';

    const jsonHtml = r.analysis_json
      ? '<pre class="pre-scroll border rounded p-2 bg-light mb-0">' + esc(JSON.stringify(r.analysis_json, null, 2)) + '</pre>'
      : '<span class="text-muted small">Not analyzed yet.</span>';

    document.getElementById('detailModalBody').innerHTML =
      '<table class="table table-sm table-borderless mb-3"><tbody>' +
      drow('From',      esc((r.from_name ? r.from_name + ' ' : '') + '<' + r.from_email + '>')) +
      drow('To',        esc(r.to_email)) +
      drow('Subject',   '<strong>' + esc(r.subject) + '</strong>') +
      drow('Received',  fmtDate(r.received_at)) +
      drow('Message ID','<code class="small">' + esc(r.message_id) + '</code>') +
      drow('Source',    esc(r.import_source)) +
      drow('Category',  catBadge(r.category) + (r.event_type ? ' <span class="text-muted small">/ ' + esc(r.event_type) + '</span>' : '')) +
      drow('Importance', impBadge(r.importance)) +
      drow('Summary',   esc(r.summary)) +
      drow('Routine',   fmtBool(r.likely_routine)) +
      drow('Action Req.', fmtBool(r.possible_action_required)) +
      drow('In Digest', fmtBool(r.include_in_digest)) +
      drow('Analyzed',  fmtDate(r.analyzed_at)) +
      drow('Digested',  r.digested_at ? fmtDate(r.digested_at) : '<span class="text-warning fw-semibold">pending</span>') +
      (r.group_id ? drow('Group', '<a href="#" class="open-group" data-gid="' + r.group_id + '">Group #' + r.group_id + '</a>') : '') +
      '</tbody></table>' +
      '<h6 class="text-muted mb-1">Clean Body <small class="fw-normal">(' + (r.clean_body_char_count ?? 0) + ' chars)</small></h6>' +
      bodyHtml +
      '<h6 class="text-muted mt-3 mb-1">Analysis JSON</h6>' +
      jsonHtml;

    document.getElementById('detailModalBody').querySelectorAll('.open-group').forEach(a =>
      a.addEventListener('click', e => { e.preventDefault(); showGroupDetail(e.target.dataset.gid); }));

  } catch (err) {
    document.getElementById('detailModalBody').innerHTML = errHtml(err.message);
  }
}

// ─── Groups ───────────────────────────────────────────────────────────────────

async function loadGroups() {
  const wrap = document.getElementById('groups-wrap');
  try {
    const rows = await api('/api/groups');

    if (!rows.length) {
      wrap.innerHTML = '<div class="text-muted py-3">No groups found.</div>';
      return;
    }

    wrap.innerHTML =
      '<div class="mb-2 small text-muted">' + rows.length + ' group(s)</div>' +
      '<div class="table-responsive">' +
      '<table class="table table-sm table-hover align-middle mb-0">' +
      '<thead class="table-light"><tr>' +
      '<th>#</th><th>Group Name</th><th>Key</th><th>Emails</th>' +
      '<th>Routine</th><th>Summary</th><th>In Digest</th><th>Analyzed</th>' +
      '</tr></thead><tbody>' +
      rows.map(r =>
        '<tr data-clickable data-id="' + r.id + '">' +
        '<td class="text-muted small">' + r.id + '</td>' +
        '<td><strong>' + esc(r.group_name) + '</strong></td>' +
        '<td><code class="small">' + esc(r.group_key) + '</code></td>' +
        '<td>' + r.email_count + '</td>' +
        '<td>' + r.routine_count + '</td>' +
        '<td><span class="trunc-lg text-muted small" title="' + esc(r.group_summary) + '">' + esc(r.group_summary) + '</span></td>' +
        '<td>' + fmtBool(r.include_in_digest) + '</td>' +
        '<td class="text-nowrap small">' + fmtDate(r.analyzed_at) + '</td>' +
        '</tr>'
      ).join('') +
      '</tbody></table></div>';

    wrap.querySelectorAll('tr[data-clickable]').forEach(tr =>
      tr.addEventListener('click', () => showGroupDetail(tr.dataset.id)));
  } catch (err) {
    wrap.innerHTML = errHtml(err.message);
  }
}

async function showGroupDetail(id) {
  showModal('Group #' + id, '<div class="text-muted">Loading…</div>');
  try {
    const { group: g, emails } = await api('/api/groups/' + id);

    const listOf = arr => arr && arr.length
      ? '<ul class="mb-0 small ps-3">' + arr.map(i => '<li>' + esc(String(i)) + '</li>').join('') + '</ul>'
      : '<span class="text-muted small">none</span>';

    const emailTable = emails.length
      ? '<table class="table table-sm table-hover mb-0"><thead class="table-light"><tr>' +
        '<th>#</th><th>From</th><th>Subject</th><th>Received</th><th>Imp.</th><th>Digested</th>' +
        '</tr></thead><tbody>' +
        emails.map(e =>
          '<tr data-clickable data-id="' + e.id + '">' +
          '<td class="text-muted small">' + e.id + '</td>' +
          '<td class="small">' + esc(e.from_name || e.from_email) + '</td>' +
          '<td class="small"><span class="trunc-md" title="' + esc(e.subject) + '">' + esc(e.subject) + '</span></td>' +
          '<td class="text-nowrap small">' + fmtDate(e.received_at) + '</td>' +
          '<td>' + impBadge(e.importance) + '</td>' +
          '<td>' + fmtBool(e.digested_at) + '</td>' +
          '</tr>'
        ).join('') +
        '</tbody></table>'
      : '<div class="text-muted small">No member emails.</div>';

    document.getElementById('detailModalBody').innerHTML =
      '<table class="table table-sm table-borderless mb-3"><tbody>' +
      drow('Name',    '<strong>' + esc(g.group_name) + '</strong>') +
      drow('Key',     '<code>' + esc(g.group_key) + '</code>') +
      drow('Summary', esc(g.group_summary)) +
      drow('Emails',  String(g.email_count)) +
      drow('Routine', String(g.routine_count)) +
      drow('In Digest', fmtBool(g.include_in_digest)) +
      drow('Analyzed', fmtDate(g.analyzed_at)) +
      '</tbody></table>' +
      '<div class="row g-3 mb-3">' +
      '<div class="col-md-6"><h6 class="text-muted mb-1">Notable Items</h6>' + listOf(g.notable_items) + '</div>' +
      '<div class="col-md-6"><h6 class="text-muted mb-1">Aggregate Facts</h6>' + listOf(g.aggregate_facts) + '</div>' +
      '</div>' +
      '<h6 class="text-muted mb-2">Member Emails (' + emails.length + ')</h6>' +
      '<div class="table-responsive">' + emailTable + '</div>';

    document.getElementById('detailModalBody').querySelectorAll('tr[data-clickable]').forEach(tr =>
      tr.addEventListener('click', () => showEmailDetail(tr.dataset.id)));
  } catch (err) {
    document.getElementById('detailModalBody').innerHTML = errHtml(err.message);
  }
}

// ─── Memory ───────────────────────────────────────────────────────────────────

async function loadMemory() {
  const wrap = document.getElementById('memory-wrap');
  try {
    const rows = await api('/api/memory');

    if (!rows.length) {
      wrap.innerHTML = '<div class="text-muted py-3">No memory items found.</div>';
      return;
    }

    wrap.innerHTML =
      '<div class="mb-2 small text-muted">' + rows.length + ' item(s)</div>' +
      '<div class="table-responsive">' +
      '<table class="table table-sm align-middle mb-0">' +
      '<thead class="table-light"><tr>' +
      '<th>Status</th><th>Key</th><th>Type</th><th>Text</th><th>Source</th><th>Expires</th><th>Updated</th>' +
      '</tr></thead><tbody>' +
      rows.map(r =>
        '<tr>' +
        '<td>' + memBadge(r.status) + '</td>' +
        '<td><code class="small">' + esc(r.memory_key) + '</code></td>' +
        '<td><span class="badge bg-light text-dark border">' + esc(r.memory_type) + '</span></td>' +
        '<td title="' + esc(r.memory_text) + '"><span class="trunc-lg small">' + esc(r.memory_text) + '</span></td>' +
        '<td class="small text-muted text-nowrap">' + esc(r.source ?? '') + '</td>' +
        '<td class="small text-nowrap">' + (r.expires_at ? fmtDate(r.expires_at) : '—') + '</td>' +
        '<td class="small text-nowrap text-muted">' + fmtDate(r.updated_at) + '</td>' +
        '</tr>'
      ).join('') +
      '</tbody></table></div>';
  } catch (err) {
    wrap.innerHTML = errHtml(err.message);
  }
}

// ─── Digests ──────────────────────────────────────────────────────────────────

async function loadDigests() {
  const wrap = document.getElementById('digests-wrap');
  try {
    const { files } = await api('/api/digests');

    if (!files.length) {
      wrap.innerHTML = '<div class="text-muted py-3">No digest files found in data/reports/.</div>';
      return;
    }

    wrap.innerHTML =
      '<div class="mb-2 small text-muted">' + files.length + ' digest(s)</div>' +
      '<div class="list-group" style="max-width:700px">' +
      files.map(f =>
        '<button type="button" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"' +
        ' data-filename="' + esc(f.filename) + '">' +
        '<div><span class="fw-semibold">' + esc(f.filename) + '</span>' +
        '<br><small class="text-muted">' + fmtDate(f.mtime) + '</small></div>' +
        '<span class="badge bg-secondary rounded-pill">' + (f.size / 1024).toFixed(1) + ' KB</span>' +
        '</button>'
      ).join('') +
      '</div>';

    wrap.querySelectorAll('[data-filename]').forEach(btn =>
      btn.addEventListener('click', () => showDigest(btn.dataset.filename)));
  } catch (err) {
    wrap.innerHTML = errHtml(err.message);
  }
}

async function showDigest(filename) {
  showModal(filename, '<div class="text-muted">Loading…</div>');
  try {
    const { content } = await api('/api/digests/' + encodeURIComponent(filename));
    document.getElementById('detailModalBody').innerHTML =
      '<pre class="pre-scroll mb-0" style="max-height:70vh">' + esc(content) + '</pre>';
  } catch (err) {
    document.getElementById('detailModalBody').innerHTML = errHtml(err.message);
  }
}

// ─── Brain & Prefs ────────────────────────────────────────────────────────────

async function loadBrainPrefs() {
  const brainEl = document.getElementById('brain-content');
  const prefsEl = document.getElementById('prefs-content');
  try {
    const [brain, prefs] = await Promise.all([api('/api/brain'), api('/api/prefs')]);
    brainEl.textContent = brain.content;
    prefsEl.textContent = prefs.content;
  } catch (err) {
    brainEl.textContent = 'Error: ' + err.message;
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('#mainTabs .nav-link').forEach(link =>
    link.addEventListener('click', e => {
      e.preventDefault();
      switchTab(e.currentTarget.dataset.tab);
    }));
  switchTab('dashboard');
});
</script>
